openapi: 3.1.0
info:
  title: agent-cli-bridge API
  version: 1.0.0
  description: API for the agent-cli-bridge application
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the embedded server and the system hostname.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Server is healthy and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  hostname:
                    type: string
                    example: "user-desktop-123"
        '400':
          description: Bad request.
        '401':
          description: Unauthorized - API key is missing or invalid.
        '404':
          description: Endpoint not found.
        '500':
          description: Internal server error.
  /exec:
    post:
      summary: Execute a shell command
      description: Validates and executes a shell command, returning exit code, stdout, and stderr.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  description: The shell command to execute.
                  example: "echo 'Hello World'"
                cwd:
                  type: string
                  description: Optional working directory for execution.
                  example: "/home/user"
      responses:
        '200':
          description: Command executed successfully (command itself may have non-zero exit code).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      exitCode:
                        type: integer
                        example: 0
                      stdout:
                        type: string
                        example: "Hello World\n"
                      stderr:
                        type: string
                        example: ""
                  error:
                    type: "null"
                  meta:
                    type: object
        '400':
          description: Bad request - invalid or missing payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized - API key is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden - command blocked by security rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error or execution failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        data:
          type: "null"
        error:
          type: object
          properties:
            code:
              type: string
              example: "BAD_REQUEST"
            message:
              type: string
              example: "Missing required field: command"
        meta:
          type: object
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
