openapi: 3.1.0
info:
  title: agent-cli-bridge API
  version: 1.7.0
  description: API for the agent-cli-bridge application
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:3000
    description: Embedded local server (port may vary between 3000–5000)
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      description: Returns the health status of the embedded server and the system hostname.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Server is healthy and running.
          content:
            application/json:
              example:
                status: "ok"
                hostname: "user-desktop-123"
              schema:
                type: object
                properties:
                  status:
                    type: string
                  hostname:
                    type: string
        '400':
          description: Bad request.
        '401':
          description: Unauthorized - API key is missing or invalid.
        '404':
          description: Endpoint not found.
        '500':
          description: Internal server error.
  /exec:
    post:
      operationId: execCommand
      summary: Execute a shell command
      description: Validates and executes a shell command, returning exit code, stdout, and stderr.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecRequest'
      responses:
        '200':
          description: Command executed successfully (command itself may have non-zero exit code).
          content:
            application/json:
              example:
                data:
                  exitCode: 0
                  stdout: "Hello World\n"
                  stderr: ""
                error: null
                meta: { }
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      exitCode:
                        type: integer
                      stdout:
                        type: string
                      stderr:
                        type: string
                  error:
                    type: "null"
                  meta:
                    type: object
        '400':
          description: Bad request - invalid or missing payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized - API key is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden - command blocked by security rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error or execution failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    ExecRequest:
      type: object
      examples:
        - data:
            command: "echo 'Hello World'"
            cwd: "/home/user"
      required:
        - command
      properties:
        command:
          type: string
          description: The shell command to execute.
        cwd:
          type: string
          description: Optional working directory for execution.
    ErrorEnvelope:
      type: object
      properties:
        data:
          type: "null"
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        meta:
          type: object
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
